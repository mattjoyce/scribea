  87M, day 7 post induction chemotherapy for AML on the haematology ward.
  Background of stage 3 CKD (baseline creatinine 150), otherwise
  reasonably preserved baseline function per family. Profoundly
  neutropenic (neutrophils 0.1). Spiked fevers to 39.5 overnight with
  rapidly progressive hypotension despite 2L crystalloid resuscitation.
  Lactate climbed from 2.5 to 7 over four hours. CXR with bilateral
  infiltrates — pneumonia is the presumed source. Intubated on the ward
  by MET before transfer for worsening hypoxaemia and obtunded conscious
  state. Broad-spectrum cefepime and amikacin commenced in ED;
  vancomycin added on ICU arrival given CVC in situ. Blood cultures from
  two sites, CVC tip, sputum, and MSU all pending. G-CSF charted. Family
  aware, for full active treatment at this time.

