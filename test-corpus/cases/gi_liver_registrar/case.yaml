  78M, post orthotopic liver transplant five years ago for primary
  sclerosing cholangitis, on long-term tacrolimus. Admitted to ICU
  yesterday with acute graft dysfunction — presented to ED with
  jaundice, encephalopathy (West Haven grade 2), and oliguria. ALT 1800,
  AST 2200, bilirubin 240, INR 1.6 on admission. Renal function
  deteriorated rapidly from a baseline creatinine of 110 — currently
  320, urine output marginal, no clear pre-renal trigger. Hepatology
  reviewed and felt this represents acute cellular rejection versus
  ischaemic injury; tacrolimus held pending further workup, transplant
  biopsy planned tomorrow if coagulation permits. Started on NIV
  overnight for hypoxic respiratory failure thought to be a mix of
  hepatopulmonary physiology and small bilateral effusions. Required
  noradrenaline support up to 0.1 mcg/kg/min, currently weaning.
  Apixaban (prescribed for AF) held on admission. Family aware and
  involved. For full active treatment at this time pending the biopsy
  result and transplant team review.

