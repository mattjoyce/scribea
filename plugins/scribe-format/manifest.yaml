manifest_spec: ductile.plugin
manifest_version: 1
name: scribe-format
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Render the structured SOAP JSON to markdown via the template's Jinja2 render.tmpl, then emit scribe.session.completed.v1 and flip the session to completed in scribe.db via the ingress callback."
concurrency_safe: true
commands:
  - name: handle
    type: write
    idempotent: true
    retry_safe: true
    values:
      consume:
        - payload.session_id
        - payload.template_id
        - payload.structured
      emit:
        - event: scribe.session.completed.v1
          values:
            - payload.session_id
            - payload.markdown
  - name: health
    type: read
    idempotent: true
    retry_safe: true
config_keys:
  required: [ingress_url, templates_dir]
  optional: []
