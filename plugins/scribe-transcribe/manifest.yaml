manifest_spec: ductile.plugin
manifest_version: 1
name: scribe-transcribe
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Transcribe one scribe clip. POSTs the clip audio to the configured whisper service (e.g. Unraid faster-whisper /transcribe-full) and callbacks scribe-ingress with the result."
concurrency_safe: true
commands:
  - name: handle
    type: write
    description: "Handle scribe.clip.received.v1 — transcribe audio and emit scribe.clip.transcribed.v1."
    idempotent: true
    retry_safe: true
    values:
      consume:
        - payload.session_id
        - payload.clip_id
        - payload.blob_path
        - payload.audio_ref
        - payload.audio_format
      emit:
        - event: scribe.clip.transcribed.v1
          values:
            - payload.session_id
            - payload.clip_id
            - payload.transcript
            - payload.segments
        - event: scribe.clip.failed.v1
          values:
            - payload.session_id
            - payload.clip_id
            - payload.reason
  - name: health
    type: read
    idempotent: true
    retry_safe: true
config_keys:
  required: [ingress_url]
  optional: [whisper_url, stub_mode, request_timeout_seconds]
