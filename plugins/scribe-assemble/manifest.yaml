manifest_spec: ductile.plugin
manifest_version: 1
name: scribe-assemble
version: 0.1.0
protocol: 2
entrypoint: run.py
description: "Compose the ordered transcript with [clip N, mm:ss] markers and gap annotations from all clips of one session. Single writer per session."
concurrency_safe: false
commands:
  - name: handle
    type: write
    idempotent: true
    retry_safe: true
    values:
      consume:
        - payload.session_id
        - payload.template_id
      emit:
        - event: scribe.session.assembled.v1
          values:
            - payload.session_id
            - payload.assembled_context
            - payload.gaps
  - name: health
    type: read
    idempotent: true
    retry_safe: true
config_keys:
  required: [ingress_url]
  optional: []
